version: '3'

env:
  KUBECONFIG:
    sh: echo "$HOME/.kube/config"

tasks:
  setup:
    desc: Install git hooks (run once after cloning)
    cmds:
      - lefthook install

  build:
    desc: Compile the flight to a wasm binary
    cmds:
      - make dist/forgejo.wasm

  test:
    desc: Run unit tests
    cmds:
      - go test ./src/...

  diff:
    desc: Preview changes against the running release
    deps: [build]
    cmds:
      - yoke takeoff -diff-only --cluster-access --namespace forgejo forgejo dist/forgejo.wasm < values.yaml

  deploy:
    desc: Deploy to the forgejo namespace
    deps: [build]
    cmds:
      - kubectl create namespace forgejo --dry-run=client -o yaml | kubectl apply -f -
      - yoke takeoff --cluster-access --namespace forgejo forgejo dist/forgejo.wasm < values.yaml

  password:
    desc: Print the admin password from the cluster
    cmds:
      - kubectl get secret -n forgejo forgejo-admin -o jsonpath='{.data.password}' | base64 -d && echo

  clean:
    desc: Remove all forgejo releases and namespaces from the cluster
    cmds:
      - yoke mayday --namespace forgejo forgejo || true
      - kubectl delete namespace forgejo --ignore-not-found
      - yoke mayday --namespace forgejo-e2e forgejo-e2e || true
      - kubectl delete namespace forgejo-e2e --ignore-not-found

  e2e:
    desc: Deploy to cluster, verify healthy, tear down
    deps: [build]
    vars:
      NS: forgejo-e2e
    cmds:
      - kubectl create namespace {{.NS}} --dry-run=client -o yaml | kubectl apply -f -
      - defer: kubectl delete namespace {{.NS}} --ignore-not-found
      - defer: yoke mayday --namespace {{.NS}} {{.NS}}
      - yoke takeoff --cluster-access --namespace {{.NS}} {{.NS}} dist/forgejo.wasm < values.yaml
      - kubectl wait --for=condition=available --timeout=180s deployment/{{.NS}} -n {{.NS}}
